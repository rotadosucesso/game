<html lang="pt-BR">
<head>

    <!-- Configuração vital para o layout Mobile-First (impede o usuário de dar zoom acidental no jogo) -->

    <!-- Cor da barra de status do celular (baseado no azul/rosa do tema) -->
    <meta name="theme-color" content="#FFC1E3">

    <!-- Importação do CSS Global que terá as variáveis de cor e fontes -->

    <!-- <link rel="manifest" href="manifest.json"> -->
</head>
<body>

    <script type="module" src="main.js"></script>

</html>
